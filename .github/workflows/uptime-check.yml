# Basic uptime check ("response scanning + observability + hardening"
# task, Part 2): a simple scheduled ping against the deployed backend's
# /health endpoint, so an outage is caught by an alert rather than
# discovered when a user reports it.
#
# Why GitHub Actions, not a third-party uptime service: this needs zero
# infrastructure this project doesn't already have. There is no account to
# create, no API key to provision, no paid tier to sign up for — the repo
# already lives on GitHub, and a scheduled workflow is a first-class,
# free-for-this-use-case GitHub feature. The failure notification path is
# also built in, not something this workflow has to construct: GitHub
# automatically emails repository watchers (by default, the repo owner) when
# a scheduled workflow run fails — no webhook, Slack integration, or extra
# secret is required for that baseline behaviour to work.
#
# Known limitation, stated honestly: GitHub automatically disables scheduled
# workflows after 60 days with no repository activity (commits, pushes,
# etc.) — see GitHub's own documentation on scheduled workflows. A genuinely
# dormant repo would silently stop being checked, not fail loudly. Re-running
# this workflow manually (the workflow_dispatch trigger below) or making any
# commit resets that clock. This is a real, accepted tradeoff of using a
# free, already-available mechanism rather than a dedicated uptime-monitoring
# service that runs independently of repository activity.
name: Uptime Check

on:
  schedule:
    # Every 10 minutes — changed from 30 in the performance pass (Step 2/3),
    # deliberately now under Render's free-tier ~15-minute spin-down window,
    # specifically so this ALSO acts as a keep-alive mitigation, not just an
    # outage check. This is a real, honest change of intent, not just a
    # number tweak: item 32/33 (Questions.md) measured a genuine 13.85s cold
    # start on this backend — by far the largest latency number found in
    # that whole report — and this is the zero-new-cost mitigation chosen
    # for it (see Questions.md's Step 2 write-up for why the real fix, a
    # paid Render tier removing spin-down entirely, was deferred to the
    # user's own billing decision rather than made here). This does NOT
    # guarantee zero cold starts — a request landing between two scheduled
    # ticks, or right after this workflow's own outage, can still hit a
    # cold instance — so it's a mitigation, not a fix, and is documented as
    # such rather than implied to fully solve the problem.
    - cron: "*/10 * * * *"
  # Lets anyone with write access trigger a check on demand — e.g. right
  # after a deploy, without waiting for the next scheduled tick.
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint (with one retry for a Render free-tier cold start)
        run: |
          URL="${LANGO_BACKEND_HEALTH_URL:-https://lango-backend-qwkx.onrender.com/health}"
          echo "Checking $URL"

          check() {
            curl -s -o /tmp/health_response.json -w "%{http_code}" --max-time 70 "$URL" || echo "000"
          }

          STATUS=$(check)
          if [ "$STATUS" != "200" ]; then
            echo "First check returned HTTP $STATUS. Render's free tier can take 30-60s to wake"
            echo "from an idle cold start (documented in this repo's README) - retrying once"
            echo "after a short wait before treating this as a real outage rather than an"
            echo "expected cold start."
            sleep 30
            STATUS=$(check)
          fi

          echo "Final HTTP status: $STATUS"
          cat /tmp/health_response.json 2>/dev/null || true

          if [ "$STATUS" != "200" ]; then
            echo "::error::Lango backend health check failed twice (final HTTP $STATUS) - this looks like a real outage, not just a cold start."
            exit 1
          fi

          echo "Backend is healthy."
        env:
          # Override via a repository variable (Settings > Secrets and
          # variables > Actions > Variables) if the deployed backend's URL
          # ever changes — no code edit needed for that.
          LANGO_BACKEND_HEALTH_URL: ${{ vars.LANGO_BACKEND_HEALTH_URL }}
