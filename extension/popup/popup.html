<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lango</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        width: 260px;
        margin: 0;
        padding: 16px;
        background: #f6f7f8;
        color: #14171c;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 12px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      h1 img {
        width: 18px;
        height: 18px;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        margin-bottom: 12px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .dot.on {
        background: #2f7a53;
      }
      .dot.off {
        background: #a83a3a;
      }
      .row {
        font-size: 11px;
        color: #5b6270;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        margin-bottom: 4px;
      }
      .count {
        font-family: ui-monospace, "SF Mono", Consolas, monospace;
        font-size: 22px;
        font-weight: 600;
        margin: 0 0 14px;
      }
      button,
      a.button {
        display: block;
        width: 100%;
        box-sizing: border-box;
        text-align: center;
        text-decoration: none;
        font-size: 12px;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #e1e4e8;
        background: #ffffff;
        color: #14171c;
        cursor: pointer;
        margin-bottom: 8px;
        font-family: inherit;
      }
      a.button.primary {
        background: #8a6323;
        color: #ffffff;
        border-color: #8a6323;
      }
      .note {
        font-size: 10px;
        color: #8a93a1;
        margin-top: 8px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <h1><img src="../icons/icon48.png" alt="" /> Lango — AI Data Guard</h1>
    <div class="status">
      <span id="statusDot" class="dot off"></span>
      <span id="statusText">Checking…</span>
    </div>
    <div class="row">Prompts scanned this session</div>
    <div class="count" id="scanCount">0</div>
    <button id="optionsBtn">Open options / log in</button>
    <a class="button primary" href="https://lango-app-dusky.vercel.app" target="_blank" rel="noopener">
      Open live dashboard
    </a>
    <p class="note">v0.1 — chatgpt.com only. See extension/README.md for scope and known limitations.</p>
    <script src="popup.js"></script>
  </body>
</html>
