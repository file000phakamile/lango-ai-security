<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lango</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        width: 280px;
        margin: 0;
        padding: 16px;
        background: #f6f7f8;
        color: #14171c;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 12px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      h1 img {
        width: 18px;
        height: 18px;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        margin-bottom: 12px;
        word-break: break-word;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .dot.on {
        background: #2f7a53;
      }
      .dot.off {
        background: #a83a3a;
      }
      .row {
        font-size: 11px;
        color: #5b6270;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        margin-bottom: 4px;
      }
      .count {
        font-family: ui-monospace, "SF Mono", Consolas, monospace;
        font-size: 22px;
        font-weight: 600;
        margin: 0 0 14px;
      }
      label {
        display: block;
        font-size: 11px;
        color: #5b6270;
        margin: 8px 0 3px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 7px 8px;
        border: 1px solid #e1e4e8;
        border-radius: 6px;
        font-size: 12px;
        font-family: inherit;
      }
      button,
      a.button {
        display: block;
        width: 100%;
        box-sizing: border-box;
        text-align: center;
        text-decoration: none;
        font-size: 12px;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #e1e4e8;
        background: #ffffff;
        color: #14171c;
        cursor: pointer;
        margin-bottom: 8px;
        font-family: inherit;
      }
      button.primary,
      a.button.primary {
        background: #8a6323;
        color: #ffffff;
        border-color: #8a6323;
        font-weight: 600;
      }
      button.danger {
        background: #ffffff;
        color: #a83a3a;
        border-color: #a83a3a55;
      }
      #loginMessage {
        font-size: 11px;
        min-height: 14px;
        margin: 4px 0 8px;
      }
      #loginMessage.error {
        color: #a83a3a;
      }
      .banner {
        background: #a83a3a1a;
        border: 1px solid #a83a3a55;
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 12px;
        margin-bottom: 10px;
        line-height: 1.4;
      }
      .advanced-link {
        font-size: 11px;
        color: #8a93a1;
        text-align: center;
        display: block;
        margin-top: 4px;
        cursor: pointer;
        text-decoration: underline;
      }
      .note {
        font-size: 10px;
        color: #8a93a1;
        margin-top: 10px;
        line-height: 1.4;
      }
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <h1><img src="../icons/icon48.png" alt="" /> Lango — AI Data Guard</h1>
    <div class="status">
      <span id="statusDot" class="dot off"></span>
      <span id="statusText">Checking…</span>
    </div>

    <!-- Shown when NOT logged in: login is right here, no menu-hunting required. -->
    <div id="loggedOutView" class="hidden">
      <div class="banner">You're not logged in — log in below to enable prompt scanning on chatgpt.com.</div>
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="compliance@lango.demo" autocomplete="username" />
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" />
      <div id="loginMessage"></div>
      <button id="loginBtn" class="primary">Log in to Lango</button>
      <span id="advancedLink" class="advanced-link">Advanced: change API URL (local dev)</span>
    </div>

    <!-- Shown when logged in. -->
    <div id="loggedInView" class="hidden">
      <div class="row">Prompts scanned this session</div>
      <div class="count" id="scanCount">0</div>
      <a class="button primary" href="https://lango-app-dusky.vercel.app" target="_blank" rel="noopener">
        Open live dashboard
      </a>
      <button id="logoutBtn" class="danger">Log out</button>
    </div>

    <p class="note">v0.1 — chatgpt.com only. See extension/README.md for scope and known limitations.</p>
    <script src="popup.js"></script>
  </body>
</html>
